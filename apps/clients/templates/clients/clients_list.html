{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">Clients</h2>

<table class="table table-striped table-hover">
    <thead>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Status</th>
        </tr>
    </thead>

    <tbody>
        {% for client in clients %}
        <tr>
            <td>{{ client.first_name }} {{ client.last_name }}</td>
            <td>{{ client.email }}</td>
            <td>{{ client.status }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
