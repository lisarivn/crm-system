{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">Dashboard</h2>

<div class="row">

    <div class="col-md-4">
        <div class="card">
            <div class="card-body">
                <h3>{{ clients_count }}</h3>
                <p>Clients</p>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card">
            <div class="card-body">
                <h3>{{ deals_count }}</h3>
                <p>Deals</p>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card">
            <div class="card-body">
                <h3>{{ notes_count }}</h3>
                <p>Notes</p>
            </div>
        </div>
    </div>

</div>

{% endblock %}
