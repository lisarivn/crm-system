{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">Notes</h2>

<table class="table table-striped table-hover">
    <thead>
        <tr>
            <th>Client</th>
            <th>Type</th>
            <th>Content</th>
            <th>Created</th>
        </tr>
    </thead>

    <tbody>
        {% for note in notes %}
        <tr>
            <td>{{ note.client }}</td>
            <td>{{ note.note_type }}</td>
            <td>{{ note.content }}</td>
            <td>{{ note.created_at }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
