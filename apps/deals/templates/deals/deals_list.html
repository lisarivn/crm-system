{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">Deals</h2>
<table class="table table-striped table-hover">
    <thead>
        <tr>
            <th>Name</th>
            <th>Status</th>
            <th>Priority</th>
            <th>Amount</th>
            <th>Description</th>
        </tr>
    </thead>

    <tbody>
        {% for deal in deals %}
        <tr>
            <td>{{ deal.name }}</td>
            <td>{{ deal.status }}</td>
            <td>{{ deal.priority }}</td>
            <td>${{ deal.amount|floatformat:2 }}</td>
            <td>{{ deal.description }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
